{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h2>✏️ Edit Expense</h2>
        <p>Update your expense details</p>
    </div>

    <form method="POST">
        <div class="form-group">
            <label>Amount (₹)</label>
            <input type="number" name="amount" value="{{ expense[2] }}" step="0.01" required>
        </div>
        <div class="form-group">
            <label>Category</label>
            <select name="category" required>
                <option value="">-- Select Category --</option>
                <option value="Food" {% if expense[3] == 'Food' %}selected{% endif %}>🍔 Food</option>
                <option value="Travel" {% if expense[3] == 'Travel' %}selected{% endif %}>✈️ Travel</option>
                <option value="Bills" {% if expense[3] == 'Bills' %}selected{% endif %}>💡 Bills</option>
                <option value="Shopping" {% if expense[3] == 'Shopping' %}selected{% endif %}>🛍️ Shopping</option>
                <option value="Health" {% if expense[3] == 'Health' %}selected{% endif %}>💊 Health</option>
                <option value="Entertainment" {% if expense[3] == 'Entertainment' %}selected{% endif %}>🎬 Entertainment</option>
                <option value="Education" {% if expense[3] == 'Education' %}selected{% endif %}>📚 Education</option>
                <option value="Other" {% if expense[3] == 'Other' %}selected{% endif %}>📦 Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Date</label>
            <input type="date" name="date" value="{{ expense[4] }}" required>
        </div>
        <div class="form-group">
            <label>Description</label>
            <input type="text" name="description" value="{{ expense[5] }}">
        </div>
        <button type="submit" class="btn-primary">Update Expense</button>
        <a href="{{ url_for('dashboard.index') }}" class="btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
