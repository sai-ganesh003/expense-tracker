{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h2>➕ Add Expense</h2>
        <p>Track a new expense</p>
    </div>

    <form method="POST">
        <div class="form-group">
            <label>Amount (₹)</label>
            <input type="number" name="amount" placeholder="e.g. 500" step="0.01" required>
        </div>
        <div class="form-group">
            <label>Category</label>
            <select name="category" required>
                <option value="">-- Select Category --</option>
                <option value="Food">🍔 Food</option>
                <option value="Travel">✈️ Travel</option>
                <option value="Bills">💡 Bills</option>
                <option value="Shopping">🛍️ Shopping</option>
                <option value="Health">💊 Health</option>
                <option value="Entertainment">🎬 Entertainment</option>
                <option value="Education">📚 Education</option>
                <option value="Other">📦 Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Date</label>
            <input type="date" name="date" required>
        </div>
        <div class="form-group">
            <label>Description</label>
            <input type="text" name="description" placeholder="e.g. Lunch with friends">
        </div>
        <button type="submit" class="btn-primary">Add Expense</button>
        <a href="{{ url_for('dashboard.index') }}" class="btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
